<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Orders</title>
    </head>
    <body>
        <h1>Orders</h1>
        <a th:href="@{/orders/create}">Create new Order</a>
        <table border="1">
            <tr>
                <th>ID</th>
                <th>Client</th>
                <th>Status</th>
                <th>Total Price</th>
                <th>Actions</th>
            </tr>
            <tr th:each="order : ${orders}">
                <td th:text="${order.id}"></td>
                <td th:text="${order.client.name}"></td>
                <td th:text="${order.status}"></td>
                <td th:text="${order.totalPrice}"></td>
                <td>
                    <a th:href="@{'/orders/' + ${order.id}}">Details</a>
                    |
                    <a th:href="@{'/orders/edit/' + ${order.id}}">Edit</a>
                    |
                    <a th:href="@{'/orders/delete/' + ${order.id}}">Delete</a>
                </td>
            </tr>
        </table>
    </body>
</html>
